<!DOCTYPE html><html lang="ja"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="MeMory アプリの開発ロードマップ"><title>MeMory Roadmap</title><style>*,*:before,*:after{box-sizing:border-box;margin:0;padding:0}:root{--font-serif: Georgia, "Times New Roman", serif;--font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;--color-bg: #ffffff;--color-text: #1a1a1a;--color-text-muted: #aaaaaa;--color-card-bg: #f9f9f9;--color-border: #e8e8e8;--max-width: 600px}html{font-size:16px}body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);line-height:1.6;-webkit-font-smoothing:antialiased}.container{max-width:var(--max-width);margin:0 auto;padding:0 1.25rem}.site-header{padding:3rem 0 2.5rem}.site-title{font-family:var(--font-serif);font-size:1.375rem;font-weight:700;letter-spacing:-.01em;color:var(--color-text)}.section{margin-bottom:2.25rem}.section-title{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.625rem}.task-list{display:flex;flex-direction:column;gap:.375rem;list-style:none}.task-card{background:var(--color-card-bg);border:1px solid var(--color-border);border-radius:9999px;padding:.4rem 1.1rem;font-size:.8125rem;color:var(--color-text);line-height:1.4;word-break:break-word}.empty-note{font-size:.8125rem;color:var(--color-text-muted);padding:.25rem 0}.extra-tasks{display:none;margin-top:.375rem}.more-btn{display:inline-block;margin-top:.5rem;background:transparent;border:1px solid var(--color-border);border-radius:9999px;padding:.35rem 1.1rem;font-size:.75rem;color:var(--color-text-muted);cursor:pointer;transition:border-color .15s ease,color .15s ease;font-family:var(--font-sans)}.more-btn:hover{border-color:#bbb;color:var(--color-text)}.site-footer{margin-top:3rem;padding:2rem 0 3.5rem;text-align:center;color:var(--color-text-muted);font-size:.75rem;line-height:1.8}@media(min-width:640px){.site-header{padding:4.5rem 0 3rem}.site-title{font-size:1.625rem}.section{margin-bottom:2.75rem}}
</style></head> <body> <header class="site-header"> <div class="container"> <h1 class="site-title">MeMory Roadmap</h1> </div> </header> <main> <div class="container"> <section class="section"> <h2 class="section-title" style="color: #333333"> 考え中 </h2> <ul class="task-list"> <li class="task-card">手動のアイテム並び替えがたまに失敗する</li> </ul>  </section><section class="section"> <h2 class="section-title" style="color: #333388"> 次の開発 </h2> <p class="empty-note">現在このステータスのタスクはありません</p>  </section><section class="section"> <h2 class="section-title" style="color: #7DB3E8"> 開発中 </h2> <p class="empty-note">現在このステータスのタスクはありません</p>  </section><section class="section"> <h2 class="section-title" style="color: #7DC8B8"> リリース準備中 </h2> <ul class="task-list"> <li class="task-card">アイテムを購入日順で並び替え</li><li class="task-card">アイテムを数量順で並び替え</li><li class="task-card">アイテムを登録日順で並び替え</li> </ul>  </section><section class="section"> <h2 class="section-title" style="color: #88C99A"> リリース済 </h2> <ul class="task-list"> <li class="task-card">画像保存時の位置調整・拡大の自由度を上げる</li><li class="task-card">カテゴリを閉じたり開いたりできるようにする</li><li class="task-card">購入時期を記録できるようにする</li> </ul>  </section> </div> </main> <footer class="site-footer"> <p>© 2026 LovaMe</p> <p>最終更新: 2026/05/21 16:05</p> </footer> <script type="module">document.querySelectorAll(".more-btn").forEach(e=>{e.addEventListener("click",()=>{const t=e.getAttribute("data-target");if(!t)return;const r=document.getElementById(t);r&&(r.classList.remove("extra-tasks"),e.remove())})});</script> </body> </html>
